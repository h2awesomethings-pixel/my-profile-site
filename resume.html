  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // 다크 모드: 메인 페이지(script.js)와 같은 localStorage 키 공유
    const html = document.documentElement;
    (function initTheme() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) html.classList.add('dark');
    })();
    document.getElementById('darkToggle').addEventListener('click', () => {
      html.classList.toggle('dark');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
    });

    // 인쇄 시 라이트 모드로 강제 전환 후 복원
    let wasDark = false;
    window.addEventListener('beforeprint', () => {
      wasDark = html.classList.contains('dark');
      html.classList.remove('dark');
    });
    window.addEventListener('afterprint', () => {
      if (wasDark) html.classList.add('dark');
    });

    // 이력서 원본(docs/resume.md)을 그대로 렌더링 — 원본 한 곳만 관리
    fetch('docs/resume.md')
      .then(res => {
        if (!res.ok) throw new Error(res.status);
        return res.text();
      })
      .then(md => {
        const el = document.getElementById('resumeContent');
        el.innerHTML = marked.parse(md);
        // 카드 앵커용 헤딩 id 부여 — 말미 날짜 괄호는 제외해서 날짜를 갱신해도 링크가 유지되게 함
        el.querySelectorAll('h2, h3, h4, h5').forEach(h => {
          h.id = h.textContent.trim().replace(/\s*\(\d{4}[^)]*\)\s*$/, '').replace(/\s+/g, '-');
        });
        // md 비동기 렌더링이 끝난 뒤에 해시 위치로 이동
        if (location.hash) {
          const target = document.getElementById(decodeURIComponent(location.hash.slice(1)));
          if (target) target.scrollIntoView();
        }
      })
      .catch(() => {
        document.getElementById('resumeContent').innerHTML =
          '<p>이력서를 불러오지 못했습니다. <a href="docs/resume.md">원본 파일</a>을 직접 확인해주세요.</p>';
      });
  </script>
